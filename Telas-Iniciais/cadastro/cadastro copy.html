<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar-se</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
    <body>
        <div class="container-main">
            <div class="sumario-cadastro">
                <div class="sumario">
                    <h2>Você esta à um passo de iniciar sua carreira profissional</h2>
                <p>Acesse milhares de cursos e pratique com Flashcards inteligentes para acelerar seu aprendizado.</p>
            </div>
        </div>
        
        <div class="formulario">
            <form class="form_box" action="/Login/Login.html" method="get">
                <h2>Inicie sua jornada</h2>
                <label for="">Nome completo</label>
                <input type="text" name="nomeCompleto" value="">
                <label for="">Email</label>
                <input type="text" name="email" value="">
                <label for="">Senha</label>
                <input type="text" name="senha" value="">
                <label for="">Confirmar senhar</label>
                <input type="text" name="confSenha" value="">
                <button type="submit">Confirmar</button>
            </form>
        </div>
    </div>
    </body>
    </html>
