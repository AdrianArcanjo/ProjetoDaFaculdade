<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Curso</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="tela03.css" />
  </head>

  <body>
    <!-- HEADER -->
    <div class="header">
      <!-- coloquei classe pra poder estilizar melhor -->
      <div class="logo">
        <strong>Como funciona o Git e GitHub</strong>
      </div>

      <!-- NAVBAR -->
      <div class="links">
        <a href="home.html" class="link">Home</a>
        <a href="aulas.html" class="link">Aulas</a>
        <a href="atividades.html" class="link">Atividades</a>

        <div class="progress">✔ <span id="progresso">0</span>%</div>
      </div>
    </div>

    <!-- CONTAINER PRINCIPAL -->
    <div class="container">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="section-title">Curso Git e GitHub</div>
        <div class="section-title">Introdução ao curso</div>

        <!-- adicionei div interna pra alinhar texto + tempo -->
        <div class="aula ativa" onclick="trocarVideo('video1', event)">
          <div>
            O que é o GitHub?
            <span>10:24</span>
          </div>
        </div>

        <div class="aula" onclick="trocarVideo('video2', event)">
          <div>
            Como usar o GitHub Desktop
            <span>15:30</span>
          </div>
        </div>

        <div class="section-title">Como criar ramificações</div>

        <div class="aula" onclick="trocarVideo('video3', event)">
          <div>
            Como criar uma branch
            <span>22:15</span>
          </div>
        </div>
      </aside>

      <!-- CONTEÚDO -->
      <main class="content">
        <!-- TABS -->
        <div class="tabs">
          <button class="active" onclick="mostrarTab('video')">
            ▶ Videoaula
          </button>
          <button onclick="mostrarTab('flashcards')">📚 Flashcards</button>
        </div>

        <!-- ÁREA DO VÍDEO -->
        <div id="video">
          <div class="player">
            <!-- ALTERADO: removi height fixo do HTML (CSS controla melhor) -->
            <iframe
              id="player"
              src="https://www.youtube.com/embed/6Czd1Yetaac"
              frameborder="0"
              allow="autoplay; encrypted-media"
              allowfullscreen
            >
            </iframe>
          </div>
        </div>

        <!-- ALTERADO: estilização futura -->
        <div class="acoes">
          <button onclick="concluirAula()">Concluir Aula</button>
        </div>

        <!-- FLASHCARDS -->
        <div id="flashcards" style="display: none">
          <div class="flashcard">
            <h2>Flashcards</h2>
            <p>Git é um sistema de controle de versão.</p>
          </div>
        </div>
      </main>
    </div>

    <script src="tela03.js"></script>
  </body>
</html>
